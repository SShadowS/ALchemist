<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a2744" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0f1628" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="24" ry="24" fill="url(#bg-glow)"/>

  <!-- Subtle circuit pattern -->
  <line x1="20" y1="40" x2="45" y2="40" stroke="#2a3a5c" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="40" x2="45" y2="55" stroke="#2a3a5c" stroke-width="1" opacity="0.5"/>
  <circle cx="45" cy="55" r="2" fill="#2a3a5c" opacity="0.5"/>
  <line x1="211" y1="200" x2="236" y2="200" stroke="#2a3a5c" stroke-width="1" opacity="0.5"/>
  <line x1="211" y1="200" x2="211" y2="215" stroke="#2a3a5c" stroke-width="1" opacity="0.5"/>
  <circle cx="211" cy="215" r="2" fill="#2a3a5c" opacity="0.5"/>
  <line x1="220" y1="35" x2="240" y2="35" stroke="#2a3a5c" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="220" x2="36" y2="220" stroke="#2a3a5c" stroke-width="1" opacity="0.4"/>

  <!-- AL text -->
  <text x="128" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="72" fill="#4ec9b0" filter="url(#glow-cyan)" letter-spacing="4">AL</text>

  <!-- Beaker/Flask -->
  <g transform="translate(128, 175)" filter="url(#glow-gold)">
    <!-- Flask neck -->
    <rect x="-8" y="-45" width="16" height="20" rx="2" fill="none" stroke="#e2b340" stroke-width="2.5"/>
    <!-- Flask body -->
    <path d="M -8,-25 L -28,10 Q -30,15 -26,18 L 26,18 Q 30,15 28,10 L 8,-25" fill="none" stroke="#e2b340" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Liquid -->
    <path d="M -22,5 L -26,14 Q -28,17 -24,17 L 24,17 Q 28,17 26,14 L 22,5 Z" fill="#e2b340" opacity="0.2"/>
    <!-- Bubbles -->
    <circle cx="-8" cy="8" r="3" fill="none" stroke="#4ec9b0" stroke-width="1.5" opacity="0.8"/>
    <circle cx="5" cy="2" r="2" fill="none" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
    <circle cx="10" cy="12" r="2.5" fill="none" stroke="#6a9955" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Green coverage dot (left) -->
  <circle cx="55" cy="130" r="6" fill="#4ec9b0" filter="url(#glow-green)" opacity="0.9"/>

  <!-- Red error dot (right) -->
  <circle cx="201" cy="130" r="6" fill="#f14c4c" opacity="0.9"/>

  <!-- Inline result arrow -->
  <g filter="url(#glow-green)" opacity="0.7">
    <text x="68" y="135" font-family="'Cascadia Code', 'Consolas', monospace" font-size="14" fill="#6a9955">--> 42</text>
  </g>
</svg>
